<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ASL Management — CRM de Clientes</title>
  <meta name="description" content="Cadastro, histórico de atendimento e agenda de retorno em um só lugar." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="assets/asl-logo.png" />
</head>
<body>
  <header class="app-header">
    <a href="#/dashboard" class="brand">
      <img src="assets/3.png" alt="ASL" />
      
    </a>
    <button id="menu-btn" class="icon-btn" aria-label="Abrir menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </header>

  <div id="menu-overlay" class="menu-overlay hidden"></div>
  <aside id="menu-panel" class="menu-panel hidden">
    <div class="menu-head">Menu</div>
    <nav class="menu-nav">
      <a href="#/dashboard" class="menu-link">Painel</a>
      <a href="#/clientes" class="menu-link">Clientes</a>
      <a href="#/agenda" class="menu-link">Agenda de Retorno</a>
    </nav>
    <div class="menu-foot">
      <button id="logout-btn" class="menu-logout">Sair</button>
    </div>
  </aside>

  <main id="app"></main>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
